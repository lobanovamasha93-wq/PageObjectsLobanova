name: Java CI with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start SUT
        run: java -jar ./artifacts/app-ibank-build-for-testers.jar -P:profile=test &

      - name: Wait for SUT to be ready
        run: |
          timeout 30s bash -c 'until printf "" 2>>/dev/null >/dev/tcp/localhost/9999; do sleep 1; done'
          echo "SUT is up and running!"

      - name: Run tests
        run: ./gradlew test -Dselenide.headless=true